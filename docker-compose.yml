version: '3.8'

services:
  api:
    build: .
    container_name: datathon
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_PATH=/app/models/predictor.joblib
      - CONFIG_PATH=/app/models/model_config.json
      - REFERENCE_PROFILE_PATH=/app/models/reference_profile.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
